name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Don't let two tag pushes publish concurrently.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance now; also enables OIDC trusted publishing later

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      # Guard against a mismatched release: the npm version comes from
      # package.json, the GitHub release from the tag — they must agree.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      # Fail the release if a high/critical vuln is present in shipped deps.
      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # ── OIDC migration (later) ───────────────────────────────────────────
      # Once this package exists on npm, configure a Trusted Publisher on
      # npmjs.com (package → Settings → Trusted Publisher → GitHub Actions,
      # repo "klaudworks/shopify-mcp", workflow "publish.yml"). Then delete the
      # NPM_TOKEN secret and drop the `env:` block above — `id-token: write`
      # already lets npm verify this workflow's identity with no stored token.

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --notes "Published \`@klaudworks/shopify-mcp@${VERSION}\` to npm.

          \`\`\`
          npm install -g @klaudworks/shopify-mcp@${VERSION}
          \`\`\`"
